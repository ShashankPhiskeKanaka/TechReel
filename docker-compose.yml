services:
  node-app:
    build:
      context: .
      dockerfile: DockerFile
    environment:
      - PORT=3000
      - REDIS_URL=redis://redis:6379

  nginx-lb:
    image: nginx:latest
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - node-app
      - redis

  redis:
    image: redis:alpine
